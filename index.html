<!DOCTYPE >
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Megumin | Katyusha" />
		<meta property="og:description" content="Megumin | Katyusha" />
		<meta property="og:title" content="Megumin" />
		<meta property="og:image" content="" />
		<meta property="og:type" content="website" />
		<link rel="canonical" href="https://katyushazhao.github.io/" />
		<meta property="og:site_name" content="@katyushazhao" />
		<meta
			name="keywords"
			content="Megumin, Katyusha, katyushazhao" />
		<meta
			property="og:image"
			content="https://cdn.discordapp.com/attachments/953841823338618900/1193970050365919292/tumblr_5d43d3aee5d6a0f535c75ebd4654a423_0a23ad45_1280.gif" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="language" content="English" />
		<meta name="author" content="Megumin" />
		<meta name="view-transition" content="same-origin" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Playpen+Sans&display=swap"
			rel="stylesheet" />
		<link rel="icon" href="./public/mahiro_flex.ico" />
		<link rel="stylesheet" href="./styles/style.css" />
		<link
			href="https://use.fontawesome.com/releases/v5.7.0/css/all.css"
			rel="stylesheet"
			crossorigin />
		<title>Megumin</title>
	</head>
	<body oncontextmenu="return true;">
		<div class="container">
			<div class="profile-border box-color">
				<div class="profile box-color">
					<div class="banner">
						<img
							loading="lazy"
							id="banner-image"
							src="./public/banner.webp"
							alt="" />
					</div>
					<div class="main-header">
						<div class="image">
							<div class="avatar">
								<img
									loading="lazy"
									class="box-color"
									id="avatar-image"
									alt=""
									aria-hidden="true"
									src="./public/av.webp" />
								<div class="status box-color tooltip">
									<img
										id="status-image"
										src="./public/status/offline.svg"
										alt="" />
								</div>
							</div>
							<!-- </button> -->
						</div>
						<div class="badges box-color" id="badges">
							<div class="badges-right">
								<a class="tooltip" aria-label="HypeSquad Brilliance">
									<img alt=" " src="./public/badges/hypesquad-brilliance.svg"
								/></a>
								<a
									class="tooltip"
									aria-label="Originally known as Katyusha#0026">
									<img alt=" " src="./public/badges/legacy-username.svg"
								/></a>
							</div>
							<div class="badges-left"></div>
							<!-- badges list-->
							<!-- -->
						</div>
					</div>
					<div class="card box-color">
						<div class="name-box">
							<span class="display-name">Megumin</span>
							<button
								class="id username"
								id="textToCopy"
								aria-label="Click to copy!"
								onclick="copyToClipboard()"></button>
							<span class="pronouns">She/Her</span>
							<div class="custom-status">
								<img id="custom-status-emoji" />
								<p class="custom-status-text"></p>
							</div>
						</div>
						<div class="body">
							<div class="content">
								<div class="about-section">
									<div class="title-body">ABOUT ME</div>
									<!-- text -->
									<span class="about-me"
										>🏳️‍⚧️ 04/12/2024
										Dms are open but I'm not the best to dm to try to be friends with.
										<br /><br />
										<a href="https://en.pronouns.page/@meguminzhao" target="_blank">https://en.pronouns.page/@meguminzhao</a>
										<a href="https://anilist.co/user/MeguminZhao/" target="_blank">https://anilist.co/user/MeguminZhao/</a
										>.</span
									>
									<!-- -->
								</div>
								<div class="title-body">ROLES</div>
								<div class="roles-body">
									<!-- roles list -->
									<div class="rol green">
										<i class="fas fa-circle"></i>
										<span>League of Legends</span>
									</div>
									<div class="rol blue">
										<i class="fas fa-circle"></i>
										<span>Valorant</span>
									</div>
									<!-- -->
								</div>
								<div class="divider social-divider"></div>
								<div class="title-body">CONNECTIONS</div>

								<div class="socials">
									<!-- social list -->
									<div class="column">
										<a
											class="platform"
											href="https://steamcommunity.com/id/MeguminZhao/"
											rel="noreferrer noopener"
											target="_blank">
											<img
												class="platform-icon"
												alt=" "
												aria-hidden="true"
												src="./public/platforms/steam.svg" />
											<div class="text-base platform-username">
												Megumin
											</div>
											<div>
												<img
													alt=" "
													id="link"
													aria-hidden="true"
													src="./public/icons/link.svg"
													class="connect" />
											</div>
										</a>
									</div>
									<div class="column">
										<a
											class="platform"
											href="https://github.com/katyushazhao"
											rel="noreferrer noopener"
											target="_blank">
											<img
												class="platform-icon"
												alt=" "
												aria-hidden="true"
												src="./public/platforms/github.svg" />
											<div class="text-base platform-username">
												KatyushaZhao
											</div>
											<div>
												<img
													alt=" "
													id="link"
													aria-hidden="true"
													src="./public/icons/link.svg"
													class="connect" />
											</div>
										</a>
									</div>
									<!-- -->
								</div>
								<div class="chat-container">
									<input
										type="text"
										id="message-input"
										placeholder="Message @Megumin" />
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script async src="./scripts/script.js"></script>
		<script defer src="./scripts/sub.js"></script>
	</body>
</html>
